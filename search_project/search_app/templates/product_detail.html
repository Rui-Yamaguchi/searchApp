{% load static %}
{% load humanize %}

<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品詳細</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- カスタム CSS -->
    <link rel="stylesheet" href="/static/styles.css">
</head>

<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h1 class="text-center mb-4">{{ product.name }}の詳細</h1>
                <!-- 商品詳細カード -->
                <div class="card shadow-sm">
                    <div class="card_text">
                        <h2 class="card-title">{{ product.name }}</h2>
                        <p class="card-text">{{ product.description }}</p>
                        <p class="card-text"><strong>{{ product.price|floatformat:0|intcomma }}円</strong></p>
                    </div>
                    <div class="card-body">
                        <!-- ボタンの配置 -->
                        <div class="d-flex justify-content-between mt-4">
                            <a href="{% url 'product_update' product.pk %}" class="btn btn-secondary">編集</a>
                            <form action="{% url 'product_delete' product.pk %}" method="POST" onsubmit="return confirm('本当に削除しますか？');">
                                {% csrf_token %}
                                <button type="submit" class="btn btn-danger">削除</button>
                            </form>
                            <a href="{% url 'product_list' %}" class="btn btn-primary">商品一覧に戻る</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

<style>
    .card_text {
        padding: var(--bs-card-spacer-y) var(--bs-card-spacer-x);
    }
    .justify-content-between {
        justify-content: flex-start !important;
        gap: 15px;
    }
    .btn-secondary {
        background-color: #c791f9;
        border: solid 1px #c791f9;
    }
    .btn-secondary:hover {
        color: var(--bs-btn-hover-color);
        background-color: #c791f9;
        border-color: #c791f9;
        opacity: .7;
    }
    .btn-primary {
        background-color: transparent;
        border: none;
        color: #0d6efd;
    }
    .btn-primary:hover {
        color: #0d6efd;
        background-color:transparent;
        border: none;
        opacity: .7;
    }
    button.btn.btn-danger {
        background-color: #762dbb;
        border: none;
    }
    button.btn.btn-danger:hover {
        background-color: #762dbb;
        opacity: .7;
    }
</style>
